---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spoke-gitops-policies
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  destination:
    namespace: policies
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    path: 4-policies/spoke-gitops
    repoURL: >-
      git@github.com:rosa-as-a-service/hub-rosa-gitops.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
