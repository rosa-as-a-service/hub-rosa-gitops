---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-spoke-gitops
  namespace: policies
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: vendor
              operator: In
              values:
                - OpenShift
            - key: name
              operator: NotIn
              values:
                - local-cluster
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-spoke-gitops-hub
  namespace: policies
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: name
              operator: In
              values:
                - local-cluster
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-spoke-gitops
  namespace: policies
placementRef:
  name: placement-spoke-gitops
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: spoke-gitops
    kind: PolicySet
    apiGroup: policy.open-cluster-management.io
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-spoke-gitops-hub
  namespace: policies
placementRef:
  name: placement-spoke-gitops-hub
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: spoke-gitops-hub
    kind: PolicySet
    apiGroup: policy.open-cluster-management.io
---
apiVersion: policy.open-cluster-management.io/v1beta1
kind: PolicySet
metadata:
  name: spoke-gitops
  namespace: policies
spec:
  description: >-
    Deploys OpenShift GitOps on spoke clusters and bootstraps
    a pull-based Application that allows spokes to self-manage
    their configuration from the git repository.
  policies:
    - policy-spoke-gitops-operator
    - policy-spoke-gitops-bootstrap
---
apiVersion: policy.open-cluster-management.io/v1beta1
kind: PolicySet
metadata:
  name: spoke-gitops-hub
  namespace: policies
spec:
  description: >-
    Hub-side configuration to enable ACM visibility into
    spoke ArgoCD Applications via managed-serviceaccount addon.
  policies:
    - policy-spoke-gitops-acm-integration
