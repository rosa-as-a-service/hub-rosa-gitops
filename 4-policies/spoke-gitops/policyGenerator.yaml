apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-spoke-gitops
placementBindingDefaults:
  name: binding-policy-spoke-gitops
policyDefaults:
  categories:
    - CM Configuration Management
  controls:
    - CM-2 Baseline Configuration
  namespace: policies
  remediationAction: enforce
  severity: medium
  standards:
    - NIST SP 800-53
policies:
  - name: policy-spoke-gitops-operator
    manifests:
      - path: policy-spoke-gitops-operator.yaml
    policySets:
      - spoke-gitops
  - name: policy-spoke-gitops-bootstrap
    manifests:
      - path: policy-spoke-gitops-bootstrap.yaml
    policySets:
      - spoke-gitops
  - name: policy-spoke-gitops-acm-integration
    manifests:
      - path: policy-spoke-gitops-acm-integration.yaml
    policySets:
      - spoke-gitops-hub
policySets:
  - description: >-
      Deploys OpenShift GitOps on spoke clusters and bootstraps
      a pull-based Application that allows spokes to self-manage
      their configuration from the git repository.
    name: spoke-gitops
    placement:
      placementPath: input/placement.yaml
  - description: >-
      Hub-side configuration to enable ACM visibility into
      spoke ArgoCD Applications via managed-serviceaccount addon.
    name: spoke-gitops-hub
    placement:
      placementPath: input/hub-placement.yaml
