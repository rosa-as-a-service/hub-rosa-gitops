apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-spoke-gitops-acm-integration
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    # Enable the managed-serviceaccount addon on each spoke
    # This runs on the HUB in the spoke's ManagedCluster namespace
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: spoke-managed-serviceaccount-addon
        spec:
          remediationAction: enforce
          severity: low
          namespaceSelector:
            matchExpressions:
              - key: cluster.open-cluster-management.io/managedCluster
                operator: Exists
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: addon.open-cluster-management.io/v1alpha1
                kind: ManagedClusterAddOn
                metadata:
                  name: managed-serviceaccount
                spec:
                  installNamespace: open-cluster-management-agent-addon
