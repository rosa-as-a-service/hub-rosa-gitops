---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rosa-as-a-service
  namespace: openshift-gitops
spec:
  destination:
    namespace: openshift-operators
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    path: 2-environments/production/hub
    repoURL: >-
      https://github.com/rosa-as-a-service/hub-rosa-gitops.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
